name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run addon_generator pipeline quality gates
        run: pytest tests/unit/test_excel_workbook_parser.py tests/integration/test_addon_generation_pipeline.py

      - name: Run full suite with addon_generator coverage gate
        run: pytest --cov=addon_generator --cov-report=term-missing --cov-fail-under=75
